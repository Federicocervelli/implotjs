name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
          actions-cache-folder: 'emsdk-cache'

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package test
        run: bun run package:test

      - name: Publish to npm
        run: npm publish

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git describe --tags --abbrev=0 "$CURRENT_TAG"^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "body=First release: $CURRENT_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "## Changes since $PREV_TAG"
            echo ""
          } > /tmp/release_body.md

          git log "$PREV_TAG".."$CURRENT_TAG" --pretty=format:"%s|%h|%an%n" > /tmp/commits.txt

          while IFS='|' read -r subject hash author; do
            # Try to link author if it looks like a GitHub handle (no spaces)
            if echo "$author" | grep -qE '^[A-Za-z0-9_-]+$'; then
              author_link="[@$author](https://github.com/$author)"
            else
              author_link="$author"
            fi
            echo "- $subject [\`$hash\`](https://github.com/${{ github.repository }}/commit/$hash) $author_link" >> /tmp/release_body.md
          done < /tmp/commits.txt

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/release_body.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
